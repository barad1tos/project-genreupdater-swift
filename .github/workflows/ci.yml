name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-lint:
    name: Build, Test & Lint
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Cache SPM packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            Packages/Core/.build
            Packages/Services/.build
            Packages/SharedUI/.build
          key: spm-${{ runner.os }}-${{ hashFiles('Packages/*/Package.swift', 'Packages/*/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Print Swift version
        run: swift --version

      - name: Build Core
        run: swift build --package-path Packages/Core

      - name: Build Services
        run: swift build --package-path Packages/Services

      - name: Build SharedUI
        run: swift build --package-path Packages/SharedUI

      - name: Test Core
        run: swift test --package-path Packages/Core

      - name: Test Services
        run: swift test --package-path Packages/Services

      - name: Install lint tools
        run: brew install swiftlint swiftformat periphery

      - name: Run SwiftLint
        run: >
          swiftlint lint --strict
          App
          Packages/Core/Sources
          Packages/Services/Sources
          Packages/SharedUI/Sources

      - name: Run SwiftFormat (check)
        run: >
          swiftformat
          App
          Packages/Core/Sources
          Packages/Services/Sources
          Packages/SharedUI/Sources
          --lint

      - name: Scan for unused code (Periphery)
        run: >
          periphery scan
          --skip-build
          --index-store-path DerivedData/Index.noindex/DataStore
          --targets Core Services SharedUI
          --format xcode

  gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [build-and-lint]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.build-and-lint.result }}" != "success" ]]; then
            echo "::error::build-and-lint failed with status: ${{ needs.build-and-lint.result }}"
            exit 1
          fi
          echo "All CI checks passed"
