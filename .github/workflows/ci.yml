name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-lint:
    name: Build, Test & Lint
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Cache SPM packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            Packages/Core/.build
            Packages/Services/.build
            Packages/SharedUI/.build
          key: spm-${{ runner.os }}-${{ hashFiles('Packages/*/Package.swift', 'Packages/*/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Print Swift version
        run: swift --version

      - name: Build Core
        run: swift build --package-path Packages/Core

      - name: Build Services
        run: swift build --package-path Packages/Services

      - name: Build SharedUI
        run: swift build --package-path Packages/SharedUI

      - name: Unlock Keychain for tests
        run: security unlock-keychain -p "" ~/Library/Keychains/login.keychain-db

      - name: Test Core
        run: swift test --package-path Packages/Core --enable-code-coverage
        timeout-minutes: 5

      - name: Test Services
        run: |
          swift test --package-path Packages/Services --enable-code-coverage &
          TEST_PID=$!
          SECONDS=0
          while kill -0 $TEST_PID 2>/dev/null; do
            if [ $SECONDS -ge 120 ]; then
              echo "::warning::swift test hung after completion, killing"
              kill $TEST_PID 2>/dev/null
              wait $TEST_PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          wait $TEST_PID
        timeout-minutes: 5

      - name: Check coverage thresholds
        run: |
          FAILED=0

          # Core coverage (threshold: 85%)
          echo "=== Core coverage ==="
          PROFDATA=$(find Packages/Core/.build -name "default.profdata" -type f 2>/dev/null | head -1)
          BINARY=$(find Packages/Core/.build -name "CorePackageTests.xctest" -type d 2>/dev/null | head -1)
          if [ -n "$PROFDATA" ] && [ -n "$BINARY" ]; then
            xcrun llvm-cov report "$BINARY/Contents/MacOS/CorePackageTests" \
              -instr-profile "$PROFDATA" \
              --ignore-filename-regex="Tests/" --ignore-filename-regex="\.build/" | tail -3
            CORE_COV=$(xcrun llvm-cov export "$BINARY/Contents/MacOS/CorePackageTests" \
              --instr-profile "$PROFDATA" --summary-only \
              --ignore-filename-regex="Tests/" --ignore-filename-regex="\.build/" 2>/dev/null \
              | python3 -c "import sys,json;d=json.load(sys.stdin);print(int(d['data'][0]['totals']['lines']['percent']))")
            echo "Core line coverage: ${CORE_COV}% (threshold: 85%)"
            if [ "$CORE_COV" -lt 85 ]; then
              echo "::error::Core coverage ${CORE_COV}% is below threshold 85%"
              FAILED=1
            fi
          else
            echo "::warning::Core coverage data not found"
          fi

          # Services coverage (threshold: 65%)
          # Excludes Core/ sources (tested separately) and system-dependent files
          echo "=== Services coverage ==="
          PROFDATA=$(find Packages/Services/.build -name "default.profdata" -type f 2>/dev/null | head -1)
          BINARY=$(find Packages/Services/.build -name "ServicesPackageTests.xctest" -type d 2>/dev/null | head -1)
          if [ -n "$PROFDATA" ] && [ -n "$BINARY" ]; then
            xcrun llvm-cov report "$BINARY/Contents/MacOS/ServicesPackageTests" \
              -instr-profile "$PROFDATA" \
              --ignore-filename-regex="Tests/" --ignore-filename-regex="\.build/" --ignore-filename-regex="Core/" | tail -3
            SVC_COV=$(xcrun llvm-cov export "$BINARY/Contents/MacOS/ServicesPackageTests" \
              --instr-profile "$PROFDATA" --summary-only \
              --ignore-filename-regex="Tests/" --ignore-filename-regex="\.build/" --ignore-filename-regex="Core/" 2>/dev/null \
              | python3 -c "import sys,json;d=json.load(sys.stdin);print(int(d['data'][0]['totals']['lines']['percent']))")
            echo "Services line coverage: ${SVC_COV}% (threshold: 65%)"
            if [ "$SVC_COV" -lt 65 ]; then
              echo "::error::Services coverage ${SVC_COV}% is below threshold 65%"
              FAILED=1
            fi
          else
            echo "::warning::Services coverage data not found"
          fi

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi
          echo "All coverage thresholds passed"

      - name: Validate entitlements
        run: bash scripts/validate-entitlements.sh

      - name: Install lint tools
        run: brew install swiftlint swiftformat periphery

      - name: Run SwiftLint
        run: >
          swiftlint lint --strict
          App
          Packages/Core/Sources
          Packages/Services/Sources
          Packages/SharedUI/Sources

      - name: Run SwiftFormat (check)
        run: >
          swiftformat
          App
          Packages/Core/Sources
          Packages/Services/Sources
          Packages/SharedUI/Sources
          --lint

      - name: Scan for unused code (Periphery)
        run: |
          for pkg in Core Services; do
            echo "=== Scanning $pkg ==="
            cd Packages/$pkg
            periphery scan \
              --retain-public \
              --retain-codable-properties \
              --format xcode \
              --strict
            cd ../..
          done

  gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [build-and-lint]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.build-and-lint.result }}" != "success" ]]; then
            echo "::error::build-and-lint failed with status: ${{ needs.build-and-lint.result }}"
            exit 1
          fi
          echo "All CI checks passed"
