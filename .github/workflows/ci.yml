name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-lint:
    name: Build, Test & Lint
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Cache SPM packages
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            Packages/Core/.build
            Packages/Services/.build
            Packages/SharedUI/.build
          key: spm-${{ runner.os }}-${{ hashFiles('Packages/*/Package.swift', 'Packages/*/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Remove unused Homebrew tap
        run: |
          TAP_PATH="$(brew --repository)/Library/Taps/aws/homebrew-tap"
          if [[ -d "$TAP_PATH" ]]; then
            HOMEBREW_NO_REQUIRE_TAP_TRUST=1 brew untap aws/tap
          fi

      - name: Print Swift version
        run: swift --version

      - name: Build Core
        run: swift build --package-path Packages/Core

      - name: Build Services
        run: swift build --package-path Packages/Services

      - name: Build SharedUI
        run: swift build --package-path Packages/SharedUI

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Xcode app gate
        run: bash scripts/xcode-gate.sh
        timeout-minutes: 15

      - name: Unlock Keychain for tests
        run: security unlock-keychain -p "" ~/Library/Keychains/login.keychain-db

      - name: Clear cached coverage data
        run: |
          for build_path in Packages/Core/.build Packages/Services/.build; do
            if [[ -d "$build_path" ]]; then
              find "$build_path" -type d -name codecov -prune -exec rm -rf {} +
            fi
          done

      - name: Test Core
        run: swift test --package-path Packages/Core --enable-code-coverage
        timeout-minutes: 5

      - name: Test Services
        run: swift test --package-path Packages/Services --enable-code-coverage
        timeout-minutes: 5

      - name: Check coverage thresholds
        run: |
          FAILED=0

          # Core coverage (threshold: 85%)
          echo "=== Core coverage ==="
          CORE_BIN_PATH=$(swift build --package-path Packages/Core --configuration debug --show-bin-path)
          CORE_BINARY="$CORE_BIN_PATH/CorePackageTests.xctest/Contents/MacOS/CorePackageTests"
          CORE_PROFDATA="$CORE_BIN_PATH/codecov/default.profdata"
          if [ -f "$CORE_PROFDATA" ] && [ -f "$CORE_BINARY" ]; then
            xcrun llvm-cov report "$CORE_BINARY" \
              -instr-profile "$CORE_PROFDATA" \
              --ignore-filename-regex="Tests/" --ignore-filename-regex="\.build/" | tail -3
            CORE_COV=$(xcrun llvm-cov export "$CORE_BINARY" \
              -instr-profile "$CORE_PROFDATA" --summary-only \
              --ignore-filename-regex="Tests/" --ignore-filename-regex="\.build/" 2>/dev/null \
              | python3 -c "import sys,json;d=json.load(sys.stdin);print(int(d['data'][0]['totals']['lines']['percent']))")
            echo "Core line coverage: ${CORE_COV}% (threshold: 85%)"
            if [ "$CORE_COV" -lt 85 ]; then
              echo "::error::Core coverage ${CORE_COV}% is below threshold 85%"
              FAILED=1
            fi
          else
            echo "::error::Core coverage data not found"
            FAILED=1
          fi

          # Services coverage (threshold: 65%)
          # Excludes Core/ sources (tested separately) and system-dependent files
          echo "=== Services coverage ==="
          SERVICES_BIN_PATH=$(swift build --package-path Packages/Services --configuration debug --show-bin-path)
          SERVICES_BINARY="$SERVICES_BIN_PATH/ServicesPackageTests.xctest/Contents/MacOS/ServicesPackageTests"
          SERVICES_PROFDATA="$SERVICES_BIN_PATH/codecov/default.profdata"
          if [ -f "$SERVICES_PROFDATA" ] && [ -f "$SERVICES_BINARY" ]; then
            xcrun llvm-cov report "$SERVICES_BINARY" \
              -instr-profile "$SERVICES_PROFDATA" \
              --ignore-filename-regex="Tests/" --ignore-filename-regex="\.build/" --ignore-filename-regex="Core/" | tail -3
            SVC_COV=$(xcrun llvm-cov export "$SERVICES_BINARY" \
              -instr-profile "$SERVICES_PROFDATA" --summary-only \
              --ignore-filename-regex="Tests/" --ignore-filename-regex="\.build/" --ignore-filename-regex="Core/" 2>/dev/null \
              | python3 -c "import sys,json;d=json.load(sys.stdin);print(int(d['data'][0]['totals']['lines']['percent']))")
            echo "Services line coverage: ${SVC_COV}% (threshold: 65%)"
            if [ "$SVC_COV" -lt 65 ]; then
              echo "::error::Services coverage ${SVC_COV}% is below threshold 65%"
              FAILED=1
            fi
          else
            echo "::error::Services coverage data not found"
            FAILED=1
          fi

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi
          echo "All coverage thresholds passed"

      - name: Validate entitlements
        run: bash scripts/validate-entitlements.sh

      - name: Install lint tools
        run: brew install swiftlint swiftformat periphery

      - name: Run SwiftLint
        run: >
          swiftlint lint --strict
          App
          Packages/Core/Sources
          Packages/DesignUI/Sources
          Packages/Services/Sources
          Packages/SharedUI/Sources

      - name: Run SwiftFormat (check)
        run: >
          swiftformat
          App
          Packages/Core/Sources
          Packages/DesignUI/Sources
          Packages/Services/Sources
          Packages/SharedUI/Sources
          --lint

      - name: Scan for unused code (Periphery)
        run: |
          for pkg in Core Services; do
            echo "=== Scanning $pkg ==="
            cd Packages/$pkg
            periphery scan \
              --retain-public \
              --retain-codable-properties \
              --format xcode \
              --strict
            cd ../..
          done

  gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [build-and-lint]
    if: always()
    permissions: {}

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.build-and-lint.result }}" != "success" ]]; then
            echo "::error::build-and-lint failed with status: ${{ needs.build-and-lint.result }}"
            exit 1
          fi
          echo "All CI checks passed"
