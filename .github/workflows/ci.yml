name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-lint:
    name: Build, Test & Lint
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            Packages/Core/.build
            Packages/Services/.build
            Packages/SharedUI/.build
          key: spm-${{ runner.os }}-${{ hashFiles('Packages/*/Package.swift', 'Packages/*/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Print Swift version
        run: swift --version

      - name: Build Core
        run: swift build --package-path Packages/Core

      - name: Build Services
        run: swift build --package-path Packages/Services

      - name: Build SharedUI
        run: swift build --package-path Packages/SharedUI

      - name: Test Core
        run: swift test --package-path Packages/Core

      - name: Test Services
        run: swift test --package-path Packages/Services

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: >
          swiftlint lint --strict
          App
          Packages/Core/Sources
          Packages/Services/Sources
          Packages/SharedUI/Sources

  gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [build-and-lint]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.build-and-lint.result }}" != "success" ]]; then
            echo "::error::build-and-lint failed with status: ${{ needs.build-and-lint.result }}"
            exit 1
          fi
          echo "All CI checks passed"
