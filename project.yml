name: GenreUpdater
options:
  bundleIdPrefix: com.genreupdater
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: true

packages:
  Core:
    path: Packages/Core
  Services:
    path: Packages/Services
  SharedUI:
    path: Packages/SharedUI
  DesignUI:
    path: Packages/DesignUI
  LucideIcons:
    url: https://github.com/JakubMazur/lucide-icons-swift.git
    from: 0.575.0

targets:
  GenreUpdater:
    type: application
    platform: macOS
    sources:
      - App
    resources:
      - path: Resources
        buildPhase: resources
    dependencies:
      - package: Core
      - package: Services
      - package: SharedUI
      - package: DesignUI
      - package: LucideIcons
    postBuildScripts:
      - name: Compile and copy AppleScript files to bundle
        script: |
          DEST="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/Scripts"
          mkdir -p "$DEST"
          for f in "${SRCROOT}/Resources/Scripts/"*.applescript; do
            name=$(basename "$f" .applescript)
            /usr/bin/osacompile -o "$DEST/${name}.scpt" "$f"
          done
        inputFiles:
          - $(SRCROOT)/Resources/Scripts/fetch_tracks.applescript
          - $(SRCROOT)/Resources/Scripts/lookup_tracks.applescript
          - $(SRCROOT)/Resources/Scripts/fetch_track_ids.applescript
          - $(SRCROOT)/Resources/Scripts/update_property.applescript
          - $(SRCROOT)/Resources/Scripts/batch_update_tracks.applescript
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/Scripts/fetch_tracks.scpt
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/Scripts/lookup_tracks.scpt
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/Scripts/fetch_track_ids.scpt
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/Scripts/update_property.scpt
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/Scripts/batch_update_tracks.scpt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.genreupdater.app
        PRODUCT_NAME: Genre Updater
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/GenreUpdater.entitlements
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          ENABLE_APP_SANDBOX: false
        Release:
          ENABLE_APP_SANDBOX: true
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Genre Updater
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "15.0"
        NSAppleMusicUsageDescription: "Genre Updater needs access to your Music library to read and update track metadata."

  GenreUpdaterTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        excludes:
          - IntegrationTests
          - E2ETests
          - UITests
    dependencies:
      - target: GenreUpdater
      - package: Core
      - package: DesignUI
      - package: Services
      - package: SharedUI
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Genre Updater.app/Contents/MacOS/Genre Updater"

  GenreUpdaterUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - Tests/UITests
    dependencies:
      - target: GenreUpdater
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.genreupdater.uitests
        TEST_TARGET_NAME: GenreUpdater

  IntegrationTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/IntegrationTests
    dependencies:
      - target: GenreUpdater
      - package: Core
      - package: Services
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        PRODUCT_BUNDLE_IDENTIFIER: com.genreupdater.integration-tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Genre Updater.app/Contents/MacOS/Genre Updater"

schemes:
  GenreUpdater:
    build:
      targets:
        GenreUpdater: all
    run:
      config: Debug
    test:
      targets:
        - name: GenreUpdaterTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  GenreUpdaterUITests:
    build:
      targets:
        GenreUpdater: all
        GenreUpdaterUITests: [test]
    test:
      targets:
        - name: GenreUpdaterUITests

  IntegrationTests:
    build:
      targets:
        GenreUpdater: all
        IntegrationTests: [test]
    test:
      targets:
        - name: IntegrationTests
