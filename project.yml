name: GenreUpdater
options:
  bundleIdPrefix: com.genreupdater
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: true

packages:
  Core:
    path: Packages/Core
  Services:
    path: Packages/Services
  SharedUI:
    path: Packages/SharedUI

targets:
  GenreUpdater:
    type: application
    platform: macOS
    sources:
      - App
    resources:
      - path: Resources
        buildPhase: resources
    dependencies:
      - package: Core
      - package: Services
      - package: SharedUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.genreupdater.app
        PRODUCT_NAME: Genre Updater
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/GenreUpdater.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: true
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Genre Updater
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "15.0"
        NSAppleMusicUsageDescription: "Genre Updater needs access to your Music library to read and update track metadata."

  GenreUpdaterTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        excludes:
          - IntegrationTests
          - E2ETests
          - UITests
    dependencies:
      - target: GenreUpdater
      - package: Core
      - package: Services
      - package: SharedUI

  GenreUpdaterUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - Tests/UITests
    dependencies:
      - target: GenreUpdater
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.genreupdater.uitests
        TEST_TARGET_NAME: GenreUpdater

  IntegrationTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/IntegrationTests
    dependencies:
      - target: GenreUpdater
      - package: Core
      - package: Services
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.genreupdater.integration-tests
